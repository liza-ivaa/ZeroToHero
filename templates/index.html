<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Статистичний калькулятор</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .result-box { margin-top: 20px; text-align: left; background: #eef9f0; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📊 Statistics Calc</h2>
        <form method="POST">
            <input type="text" name="numbers" placeholder="Введіть числа (напр: 5, 12, 8)" required>
            <br>
            <button type="submit">Розрахувати</button>
        </form>

        {% if result %}
        <div class="result-box">
            <p><b>Середнє:</b> {{ result.mean }}</p>
            <p><b>Медіана:</b> {{ result.median }}</p>
            <p><b>Дисперсія:</b> {{ result.var }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
